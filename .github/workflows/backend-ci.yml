name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

defaults:
  run:
    working-directory: backend

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: medi_help_test
          POSTGRES_USER: health_user
          POSTGRES_PASSWORD: health_password
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U health_user -d medi_help_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Lint with Ruff
        run: python -m ruff check .

      - name: Check formatting with Black
        run: python -m black --check .

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://health_user:health_password@localhost:5433/medi_help_test
        run: python -m pytest -q
